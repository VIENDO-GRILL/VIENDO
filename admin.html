<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin · Plat du Jour · VIENDO GRILL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#E9C349;
  --gold-dim:rgba(233,195,73,.18);
  --gold-glow:rgba(233,195,73,.08);
  --bg:#06060A;
  --surface:#0E0E14;
  --card:#111118;
  --text:#F5F0E8;
  --muted:rgba(245,240,232,.38);
  --radius:0px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}

/* ── PARTICLES / AMBIENT ── */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(233,195,73,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{
  border-bottom:1px solid var(--gold-dim);
  padding:20px 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,6,10,.9);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:16px}
.logo-mark{width:36px;height:36px;border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);opacity:.8}
.logo-sub{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:20px}
.live-badge{display:flex;align-items:center;gap:7px;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(233,195,73,.6)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:1px solid var(--gold-dim);padding:8px 16px;background:transparent;transition:border-color .2s,color .2s}
.btn-logout:hover{border-color:rgba(233,195,73,.4);color:var(--text)}

/* ── LOGIN SCREEN ── */
#loginScreen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;
}
.login-card{
  width:100%;max-width:400px;
  border:1px solid var(--gold-dim);
  background:var(--surface);
  padding:52px 40px;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.login-brand{text-align:center;margin-bottom:40px}
.login-brand-title{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:8px}
.login-brand-name{font-size:22px;font-style:italic;font-family:Georgia,serif;color:var(--text)}
.login-label{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:10px}
.login-input{
  width:100%;background:#0a0a10;border:1px solid var(--gold-dim);
  color:var(--text);padding:14px 18px;font-size:14px;letter-spacing:.08em;
  outline:none;transition:border-color .2s;margin-bottom:8px;
}
.login-input:focus{border-color:rgba(233,195,73,.5)}
.login-err{color:#c0514a;font-size:8px;letter-spacing:.15em;text-transform:uppercase;min-height:18px;margin-bottom:14px}
.login-btn{
  width:100%;background:var(--gold);color:#06060A;border:none;
  padding:15px;font-size:9px;letter-spacing:.3em;text-transform:uppercase;
  font-weight:700;cursor:pointer;transition:opacity .2s;
}
.login-btn:hover{opacity:.85}

/* ── PANEL ── */
#panel{flex:1;display:none;flex-direction:column;padding:0}

/* ── TODAY BANNER ── */
.today-banner{
  border-bottom:1px solid var(--gold-dim);
  padding:28px 40px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
}
.today-left{display:flex;align-items:baseline;gap:14px}
.today-day{font-family:Georgia,serif;font-style:italic;font-size:2.2rem;color:var(--gold);line-height:1}
.today-full{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);align-self:center}
.current-pill{
  background:rgba(233,195,73,.07);border:1px solid rgba(233,195,73,.2);
  padding:10px 20px;display:flex;align-items:center;gap:12px;
}
.current-pill-label{font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);opacity:.7}
.current-pill-name{font-family:Georgia,serif;font-style:italic;font-size:1.1rem;color:var(--text);direction:rtl}

/* ── DISHES GRID ── */
.dishes-section{flex:1;padding:36px 40px}
.section-title{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.dishes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
  margin-bottom:36px;
}
.dish-card{
  background:var(--card);
  border:1px solid rgba(245,240,232,.06);
  padding:20px 18px;
  cursor:pointer;
  transition:border-color .18s,background .18s,transform .15s;
  position:relative;
  overflow:hidden;
}
.dish-card::after{
  content:'';
  position:absolute;top:0;left:0;right:0;height:0;
  background:linear-gradient(180deg,rgba(233,195,73,.08),transparent);
  transition:height .2s;
}
.dish-card:hover{border-color:rgba(233,195,73,.3);transform:translateY(-2px)}
.dish-card:hover::after{height:40px}
.dish-card.active{border-color:var(--gold);background:rgba(233,195,73,.05)}
.dish-card.active::after{height:40px}
.dish-num{font-size:8px;letter-spacing:.2em;color:rgba(245,240,232,.2);font-family:'Courier New',monospace;margin-bottom:10px}
.dish-ar{font-family:Georgia,serif;font-style:italic;font-size:1.15rem;color:var(--text);direction:rtl;margin-bottom:6px;line-height:1.3}
.dish-fr{font-size:7.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.check-badge{
  position:absolute;top:12px;right:12px;
  background:var(--gold);color:#06060A;
  font-size:7px;letter-spacing:.15em;padding:3px 7px;
  font-weight:700;opacity:0;transition:opacity .2s;
  font-family:'Courier New',monospace;
}
.dish-card.active .check-badge{opacity:1}

/* ── SAVE BAR ── */
.save-bar{
  border-top:1px solid var(--gold-dim);
  padding:24px 40px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
  background:rgba(6,6,10,.95);
  backdrop-filter:blur(12px);
  position:sticky;bottom:0;
}
.selected-preview{font-size:9px;letter-spacing:.15em;color:var(--muted)}
.selected-preview span{color:var(--text);font-style:italic;font-family:Georgia,serif;font-size:1rem}
.save-btn{
  background:var(--gold);color:#06060A;border:none;
  padding:15px 36px;font-size:9px;letter-spacing:.3em;text-transform:uppercase;
  font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;
  min-width:240px;
}
.save-btn:hover:not(:disabled){opacity:.85;transform:translateY(-1px)}
.save-btn:disabled{opacity:.3;cursor:not-allowed}
.status-msg{font-size:8px;letter-spacing:.18em;text-transform:uppercase;min-height:16px;transition:color .3s}
.status-msg.ok{color:#5bab6a}
.status-msg.err{color:#c0514a}

@media(max-width:600px){
  .topbar,.today-banner,.dishes-section,.save-bar{padding-left:20px;padding-right:20px}
  .today-day{font-size:1.6rem}
  .save-btn{min-width:auto;flex:1}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E9C349" stroke-width="1.3">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">VIENDO GRILL</div>
        <div class="logo-sub">Panneau d'administration</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="live-badge"><span class="live-dot"></span>EN LIGNE</div>
      <button class="btn-logout" id="logoutBtn" style="display:none" onclick="logout()">DÉCONNEXION</button>
    </div>
  </header>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-title">Accès réservé</div>
        <div class="login-brand-name">Plat du Jour</div>
      </div>
      <label class="login-label" for="pwdInput">Mot de passe</label>
      <input class="login-input" type="password" id="pwdInput" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')doLogin()"/>
      <div class="login-err" id="loginErr"></div>
      <button class="login-btn" onclick="doLogin()">ACCÉDER AU PANNEAU</button>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panel">

    <!-- TODAY BANNER -->
    <div class="today-banner">
      <div class="today-left">
        <div class="today-day" id="todayDay">—</div>
        <div class="today-full" id="todayFull">—</div>
      </div>
      <div class="current-pill" id="currentPill" style="display:none">
        <div class="current-pill-label">Sélectionné</div>
        <div class="current-pill-name" id="currentName">—</div>
      </div>
    </div>

    <!-- DISHES -->
    <div class="dishes-section">
      <div class="section-title">Sélectionner le plat du jour</div>
      <div class="dishes-grid" id="dishesGrid"></div>
    </div>

    <!-- SAVE BAR -->
    <div class="save-bar">
      <div>
        <div class="selected-preview" id="selectedPreview">Aucun plat sélectionné</div>
        <div class="status-msg" id="statusMsg"></div>
      </div>
      <button class="save-btn" id="saveBtn" onclick="savePlat()" disabled>
        ENREGISTRER LE PLAT DU JOUR
      </button>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script>
const ADMIN_PASSWORD = 'viendo2026';
const DISHES = [
  { id:1, ar:'كبدة مشرملة',          fr:'Kebda Mecherrmla' },
  { id:2, ar:'مثوم',                  fr:'Mthom' },
  { id:3, ar:'طاجين زيتون باللحم',   fr:'Tajine Zitoune Bil Lahm' },
  { id:4, ar:'دوارة الخروف',          fr:'Dawara Kharuf' },
  { id:5, ar:'طاجين شطيطحة لحم',     fr:'Tajine Chtitha Lahm' },
  { id:6, ar:'طاجين شطيطحة لسان',    fr:'Tajine Chtitha Lsan' },
  { id:7, ar:'لوبية بالكرعين',        fr:"Loubia Bil Kra'in" },
  { id:8, ar:'لوبية قرينية',          fr:'Loubia Grinia' },
  { id:9, ar:'قناوية باللحم الخروف',  fr:'Gnaouia Bil Lahm Kharuf' },
];
let selectedId = null;

function doLogin(){
  const val = document.getElementById('pwdInput').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panel').style.display = 'flex';
    document.getElementById('logoutBtn').style.display = 'block';
    initPanel();
  } else {
    const err = document.getElementById('loginErr');
    err.textContent = 'Mot de passe incorrect';
    document.getElementById('pwdInput').select();
    setTimeout(()=>err.textContent='', 3000);
  }
}

function logout(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('pwdInput').value = '';
  selectedId = null;
}

function initPanel(){
  const days   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const now = new Date();
  document.getElementById('todayDay').textContent  = days[now.getDay()];
  document.getElementById('todayFull').textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

  const grid = document.getElementById('dishesGrid');
  grid.innerHTML = '';
  DISHES.forEach(d=>{
    const card = document.createElement('div');
    card.className = 'dish-card';
    card.id = 'card-' + d.id;
    card.innerHTML = `
      <div class="dish-num">${String(d.id).padStart(2,'0')}</div>
      <div class="dish-ar">${d.ar}</div>
      <div class="dish-fr">${d.fr}</div>
      <div class="check-badge">✓ ACTIF</div>
    `;
    card.onclick = () => selectDish(d.id);
    grid.appendChild(card);
  });

  loadCurrentPlat();
}

async function loadCurrentPlat(){
  if(typeof JSONBIN_BIN_ID === 'undefined' || JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE') return;
  try{
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest?t=${Date.now()}`,{
      headers:{'X-Master-Key': JSONBIN_API_KEY},
      cache: 'no-store'
    });
    const j = await r.json();
    const dish = j.record?.dish;
    if(dish){
      document.getElementById('currentPill').style.display = 'flex';
      document.getElementById('currentName').textContent   = dish.name_ar;
      document.getElementById('card-'+dish.id)?.classList.add('active');
      selectedId = dish.id;
      updatePreview(dish);
      document.getElementById('saveBtn').disabled = false;
    }
  } catch(e){ console.warn('JSONBin read:', e); }
}

function selectDish(id){
  document.querySelectorAll('.dish-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('card-'+id).classList.add('active');
  selectedId = id;
  const dish = DISHES.find(d=>d.id===id);
  updatePreview(dish);
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('statusMsg').textContent = '';
  document.getElementById('statusMsg').className = 'status-msg';
}

function updatePreview(dish){
  document.getElementById('selectedPreview').innerHTML =
    `Plat sélectionné : <span>${dish.ar}</span>`;
}

async function savePlat(){
  if(!selectedId) return;
  if(typeof JSONBIN_BIN_ID === 'undefined' || JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE'){
    setStatus('Configurez config.js avec vos identifiants JSONBin','err');
    return;
  }
  const dish = DISHES.find(d=>d.id===selectedId);
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'ENREGISTREMENT…';
  try{
    const today = new Date().toISOString().split('T')[0];
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},
      body: JSON.stringify({dish:{id:dish.id,name_ar:dish.ar,name_fr:dish.fr,updated:today}})
    });
    if(r.ok){
      document.getElementById('currentPill').style.display = 'flex';
      document.getElementById('currentName').textContent   = dish.ar;
      setStatus('✓ Plat du jour mis à jour avec succès','ok');
    } else {
      setStatus('Erreur réseau — vérifiez config.js','err');
    }
  } catch(e){
    setStatus('Erreur réseau — vérifiez config.js','err');
  }
  btn.disabled = false;
  btn.textContent = 'ENREGISTRER LE PLAT DU JOUR';
}

function setStatus(msg, type){
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
  if(type==='ok') setTimeout(()=>{ el.textContent=''; el.className='status-msg'; }, 4000);
}
</script>
</body>
</html>
